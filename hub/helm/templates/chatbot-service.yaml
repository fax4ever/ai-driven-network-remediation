apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hub.fullname" . }}-chatbot-service
  labels:
    {{- include "hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: chatbot-service
spec:
  replicas: {{ .Values.chatbotService.replicaCount }}
  selector:
    matchLabels:
      {{- include "hub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chatbot-service
  template:
    metadata:
      labels:
        {{- include "hub.labels" . | nindent 8 }}
        app.kubernetes.io/component: chatbot-service
    spec:
      containers:
        - name: chatbot-service
          image: "{{ .Values.image.registry }}/{{ .Values.image.chatbotService }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_OPENSHIFT_URL
              value: {{ .Values.chatbotService.env.mcpOpenshiftUrl | quote }}
            - name: MCP_LOKISTACK_URL
              value: {{ .Values.chatbotService.env.mcpLokistackUrl | quote }}
            - name: MCP_KAFKA_URL
              value: {{ .Values.chatbotService.env.mcpKafkaUrl | quote }}
            - name: MCP_AAP_URL
              value: {{ .Values.chatbotService.env.mcpAapUrl | quote }}
            - name: MCP_SERVICENOW_URL
              value: {{ .Values.chatbotService.env.mcpServicenowUrl | quote }}
            - name: SERVICENOW_URL
              value: {{ .Values.chatbotService.env.servicenowUrl | quote }}
            - name: KAFKA_BOOTSTRAP
              value: {{ .Values.chatbotService.env.kafkaBootstrap | quote }}
            - name: MODEL_API_URL
              value: {{ .Values.chatbotService.env.modelApiUrl | quote }}
            - name: MODEL_NAME
              value: {{ .Values.chatbotService.env.modelName | quote }}
            - name: DEMO_TOPIC
              value: {{ .Values.chatbotService.env.demoTopic | quote }}
            - name: AUDIT_TOPIC
              value: {{ .Values.chatbotService.env.auditTopic | quote }}
          livenessProbe:
            {{- toYaml .Values.chatbotService.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.chatbotService.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.chatbotService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hub.fullname" . }}-chatbot-service
  labels:
    {{- include "hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: chatbot-service
spec:
  type: {{ .Values.chatbotService.service.type }}
  ports:
    - port: {{ .Values.chatbotService.service.port }}
      targetPort: {{ .Values.chatbotService.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "hub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chatbot-service
