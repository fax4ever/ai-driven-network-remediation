apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hub.fullname" . }}-ingestion-pipeline
  labels:
    {{- include "hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-pipeline
spec:
  replicas: {{ .Values.ingestionPipeline.replicaCount }}
  selector:
    matchLabels:
      {{- include "hub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingestion-pipeline
  template:
    metadata:
      labels:
        {{- include "hub.labels" . | nindent 8 }}
        app.kubernetes.io/component: ingestion-pipeline
    spec:
      {{- if .Values.ingestionPipeline.waitForDeps }}
      initContainers:
        - name: wait-for-minio
          image: "curlimages/curl:8.13.0"
          command: ["sh", "-c"]
          args:
            - |
              retries=0
              until curl -sf http://{{ .Values.minio.host }}:{{ .Values.minio.port }}/minio/health/ready; do
                retries=$((retries + 1))
                if [ $retries -ge 40 ]; then
                  echo "MinIO not ready after 40 attempts — proceeding anyway"
                  exit 0
                fi
                echo "Waiting for MinIO... ($retries/40)"
                sleep 3
              done
        - name: wait-for-llamastack
          image: "curlimages/curl:8.13.0"
          command: ["sh", "-c"]
          args:
            - |
              retries=0
              max_retries=36
              until curl -sf http://{{ .Values.ingestionPipeline.llamastackHost }}:{{ index .Values "llama-stack" "port" }}/v1/models; do
                retries=$((retries + 1))
                if [ $retries -ge $max_retries ]; then
                  echo "LlamaStack not ready after $max_retries attempts — proceeding anyway (auto-ingest will retry)"
                  exit 0
                fi
                echo "Waiting for LlamaStack... ($retries/$max_retries)"
                sleep 5
              done
      {{- end }}
      containers:
        - name: ingestion-pipeline
          image: "{{ .Values.image.registry }}/{{ .Values.image.ingestionPipeline }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: AUTO_INGEST_ON_STARTUP
              value: {{ .Values.ingestionPipeline.autoIngestOnStartup | default "true" | quote }}
            - name: LLAMASTACK_HOST
              value: {{ .Values.ingestionPipeline.llamastackHost | default (index .Values "llama-stack" "host") | quote }}
            - name: LLAMASTACK_PORT
              value: {{ index .Values "llama-stack" "port" | quote }}
            - name: VECTOR_STORE_NAME
              value: {{ .Values.ingestionPipeline.vectorStoreName | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.ingestionPipeline.embeddingModel | quote }}
            - name: CHUNK_SIZE_TOKENS
              value: {{ .Values.ingestionPipeline.chunkSizeTokens | quote }}
            - name: CHUNK_OVERLAP_TOKENS
              value: {{ .Values.ingestionPipeline.chunkOverlapTokens | quote }}
            - name: MINIO_ENDPOINT
              value: {{ printf "%s:%s" .Values.minio.host .Values.minio.port | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.secretName | quote }}
                  key: user
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.secretName | quote }}
                  key: password
            - name: MINIO_BUCKET
              value: {{ .Values.ingestionPipeline.minio.bucket | quote }}
            - name: MINIO_SECURE
              value: {{ .Values.ingestionPipeline.minio.secure | quote }}
            - name: MINIO_RUNBOOK_PREFIX
              value: {{ .Values.ingestionPipeline.minio.runbookPrefix | quote }}
          livenessProbe:
            {{- toYaml .Values.ingestionPipeline.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ingestionPipeline.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.ingestionPipeline.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hub.fullname" . }}-ingestion-pipeline
  labels:
    {{- include "hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-pipeline
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-pipeline
