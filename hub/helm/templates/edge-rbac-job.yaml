{{- if .Values.edgeRbac.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hub.fullname" . }}-edge-rbac
  labels:
    {{- include "hub.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: edge-rbac-setup
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "hub.fullname" . }}-edge-rbac
      containers:
        - name: setup
          image: {{ .Values.edgeRbac.image | default "image-registry.openshift-image-registry.svc:5000/openshift/cli:latest" }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              EDGE_NAMESPACE="{{ .Values.edgeRbac.edgeNamespace }}"
              HUB_NAMESPACE="{{ .Release.Namespace }}"
              EDGE_SERVER="{{ .Values.edgeRbac.edgeApiServer | default "https://kubernetes.default.svc" }}"
              SA_NAME=noc-openshift-mcp
              SCOPED_NAME="noc-openshift-mcp-${EDGE_NAMESPACE}"

              oc create namespace "$EDGE_NAMESPACE" 2>/dev/null || true

              cat <<RBAC_EOF | oc apply -n "$EDGE_NAMESPACE" -f -
              ---
              apiVersion: v1
              kind: ServiceAccount
              metadata:
                name: ${SA_NAME}
              ---
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRole
              metadata:
                name: ${SCOPED_NAME}
              rules:
                - apiGroups: [""]
                  resources: ["namespaces"]
                  verbs: ["list", "get"]
                - apiGroups: [""]
                  resources: ["pods"]
                  verbs: ["list", "get"]
                - apiGroups: [""]
                  resources: ["pods/log"]
                  verbs: ["get"]
                - apiGroups: [""]
                  resources: ["events"]
                  verbs: ["list", "get"]
                - apiGroups: ["apps"]
                  resources: ["deployments"]
                  verbs: ["get", "list", "patch"]
                - apiGroups: ["apps"]
                  resources: ["replicasets"]
                  verbs: ["get", "list"]
              ---
              apiVersion: rbac.authorization.k8s.io/v1
              kind: ClusterRoleBinding
              metadata:
                name: ${SCOPED_NAME}
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: ClusterRole
                name: ${SCOPED_NAME}
              subjects:
                - kind: ServiceAccount
                  name: ${SA_NAME}
                  namespace: ${EDGE_NAMESPACE}
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: ${SA_NAME}-token
                annotations:
                  kubernetes.io/service-account.name: ${SA_NAME}
              type: kubernetes.io/service-account-token
              RBAC_EOF

              for _ in 1 2 3 4 5; do
                TOKEN=$(oc get secret "$SA_NAME-token" -n "$EDGE_NAMESPACE" \
                  -o jsonpath='{.data.token}' 2>/dev/null || true)
                [ -n "$TOKEN" ] && break
                sleep 2
              done
              [ -z "$TOKEN" ] && echo "ERROR: token not populated after waiting" && exit 1
              TOKEN=$(echo "$TOKEN" | base64 -d)

              CA_FILE=$(mktemp)
              oc get secret "$SA_NAME-token" -n "$EDGE_NAMESPACE" \
                -o jsonpath='{.data.ca\.crt}' | base64 -d > "$CA_FILE"

              EDGE_KC=$(mktemp)
              KUBECONFIG="$EDGE_KC" oc config set-cluster edge \
                --server="$EDGE_SERVER" --certificate-authority="$CA_FILE" --embed-certs=true > /dev/null
              KUBECONFIG="$EDGE_KC" oc config set-credentials "$SA_NAME" --token="$TOKEN" > /dev/null
              KUBECONFIG="$EDGE_KC" oc config set-context edge \
                --cluster=edge --namespace="$EDGE_NAMESPACE" --user="$SA_NAME" > /dev/null
              KUBECONFIG="$EDGE_KC" oc config use-context edge > /dev/null

              oc create secret generic noc-openshift-edge-kubeconfig \
                --from-file=kubeconfig="$EDGE_KC" \
                -n "$HUB_NAMESPACE" --dry-run=client -o yaml | oc apply -f -

              rm -f "$CA_FILE" "$EDGE_KC"
              echo "Edge RBAC setup complete for namespace $EDGE_NAMESPACE"
{{- end }}
