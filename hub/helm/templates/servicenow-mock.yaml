{{- if .Values.servicenowMock.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicenow-mock
  labels:
    app: servicenow-mock
    {{- include "hub.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicenow-mock
  template:
    metadata:
      labels:
        app: servicenow-mock
    spec:
      containers:
        - name: servicenow-mock
          image: "{{ .Values.servicenowMock.image.repository }}:{{ .Values.servicenowMock.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: API_KEY
              value: {{ .Values.servicenowMock.apiKey | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: servicenow-mock
  labels:
    app: servicenow-mock
    {{- include "hub.labels" . | nindent 4 }}
spec:
  selector:
    app: servicenow-mock
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
