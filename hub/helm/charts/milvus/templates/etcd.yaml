apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd-deployment
  labels:
    app: etcd
    app.kubernetes.io/name: etcd
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: {{ .Values.etcd.image.repository }}:{{ .Values.etcd.image.tag }}
          imagePullPolicy: {{ .Values.etcd.image.pullPolicy }}
          command:
            - etcd
            - --advertise-client-urls=http://127.0.0.1:2379
            - --listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          ports:
            - containerPort: 2379
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          resources:
            {{- toYaml .Values.etcd.resources | nindent 12 }}
      volumes:
        - name: etcd-data
          emptyDir: {} # This can fall Use PVC if it not a qucisktart
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-service
  labels:
    app.kubernetes.io/name: etcd
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  ports:
    - port: 2379
      targetPort: 2379
  selector:
    app: etcd
