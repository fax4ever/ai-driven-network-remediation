{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: milvus-secret
  labels:
    app.kubernetes.io/name: milvus
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  root-password: {{ .Values.secret.rootPassword | quote }}
  MILVUS_ENDPOINT: "tcp://milvus-service:19530"
  MILVUS_TOKEN: {{ printf "root:%s" .Values.secret.rootPassword | quote }}
  MILVUS_CONSISTENCY_LEVEL: "Bounded"
{{- end }}
