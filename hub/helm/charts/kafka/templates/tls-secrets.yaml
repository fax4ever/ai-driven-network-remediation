{{- if .Values.kafka.tls.enabled -}}
{{- $serverSecret := (lookup "v1" "Secret" .Release.Namespace "kafka-tls") -}}
{{- if not $serverSecret -}}
{{- $externalHost := include "kafka.externalHost" . -}}
{{- $ca := genCA "kafka-ca" 3650 -}}
{{- $altNames := list
      $externalHost
      "kafka"
      "kafka-headless"
      "kafka-0.kafka-headless"
      (printf "kafka-0.kafka-headless.%s.svc.cluster.local" .Release.Namespace)
-}}
{{- $serverCert := genSignedCert "kafka-server" nil $altNames 3650 $ca -}}
{{- $clientCert := genSignedCert "kafka-client" nil nil 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: kafka-tls
  labels:
    app: kafka
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  tls.crt: {{ $serverCert.Cert | b64enc }}
  tls.key: {{ $serverCert.Key | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-client-tls
  labels:
    app: kafka
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  client.crt: {{ $clientCert.Cert | b64enc }}
  client.key: {{ $clientCert.Key | b64enc }}
{{- end -}}
{{- end -}}
