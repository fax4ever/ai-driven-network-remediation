apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-autorag-secret
  labels:
    app.kubernetes.io/name: autorag
    app.kubernetes.io/instance: {{ .Release.Name }}
    ogx.io/watch: "true"
type: Opaque
stringData:
  INFERENCE_MODEL: {{ .Values.inference.model | quote }}
  VLLM_URL: {{ .Values.inference.url | quote }}
  VLLM_API_TOKEN: {{ .Values.inference.apiToken | quote }}
  VLLM_TLS_VERIFY: {{ .Values.inference.tlsVerify | quote }}
  VLLM_MAX_TOKENS: {{ .Values.inference.maxTokens | quote }}
