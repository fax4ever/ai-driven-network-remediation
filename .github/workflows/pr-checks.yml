name: Pull Request Checks

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    if: github.repository == 'rh-ai-quickstart/ai-driven-network-remediation'
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run unit tests
        run: make unit-tests

  e2e-tests:
    if: github.repository == 'rh-ai-quickstart/ai-driven-network-remediation'
    name: Run e2e tests
    runs-on: ubuntu-latest
    steps:
      - name: Validate ADNR_LLM_ID variable
        shell: bash
        env:
          ADNR_LLM_ID: ${{ vars.ADNR_LLM_ID }}
        run: |
          if [ -z "${ADNR_LLM_ID}" ]; then
            echo "ADNR_LLM_ID variable is missing or empty. Set it in repository or organization variables."
            exit 1
          fi

      - name: Validate ADNR_LLM_URL variable
        shell: bash
        env:
          ADNR_LLM_URL: ${{ vars.ADNR_LLM_URL }}
        run: |
          if [ -z "${ADNR_LLM_URL}" ]; then
            echo "ADNR_LLM_URL variable is missing or empty. Set it in repository or organization variables."
            exit 1
          fi

      - name: Validate ADNR_LLM_TOKEN secret
        shell: bash
        env:
          ADNR_LLM_TOKEN: ${{ secrets.ADNR_LLM_TOKEN }}
        run: |
          if [ -z "${ADNR_LLM_TOKEN}" ]; then
            echo "ADNR_LLM_TOKEN secret is missing or empty. Set it in repository or organization secrets."
            exit 1
          fi

      - name: Print run context
        run: |
          echo "workflow : ${{ github.workflow }}"
          echo "ref      : ${{ github.ref }}"
          echo "pr sha   : ${{ github.event.pull_request.head.sha }}"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Deploy Kind cluster
        uses: ./.github/actions/kind
        env:
          ADNR_LLM_ID: ${{ vars.ADNR_LLM_ID }}
          ADNR_LLM_URL: ${{ vars.ADNR_LLM_URL }}
          ADNR_LLM_TOKEN: ${{ secrets.ADNR_LLM_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run integration tests
        run: make integration-tests

      - name: Collect ingestion-pipeline diagnostics
        if: failure()
        run: |
          echo "=== Ingestion-pipeline pod status ==="
          oc get pods -l app.kubernetes.io/component=ingestion-pipeline -n hub -o wide
          echo ""
          echo "=== Ingestion-pipeline describe (events + status) ==="
          oc describe pod -l app.kubernetes.io/component=ingestion-pipeline -n hub | tail -40
          echo ""
          echo "=== Ingestion-pipeline logs (current) ==="
          oc logs -l app.kubernetes.io/component=ingestion-pipeline -n hub --tail=80 2>/dev/null || echo "No logs"
          echo ""
          echo "=== Ingestion-pipeline previous logs (if crashed) ==="
          oc logs -l app.kubernetes.io/component=ingestion-pipeline -n hub --previous --tail=80 2>/dev/null || echo "No previous logs"
          echo ""
          echo "=== LlamaStack service endpoints ==="
          oc get endpoints -n hub | grep -i llama || echo "No llama endpoints"
          oc get svc -n hub | grep -i llama || echo "No llama services"
        shell: bash

      - name: Collect Kafka diagnostics
        if: failure()
        run: |
          echo "=== Kafka pod status ==="
          oc get pods -l app=kafka -n hub -o wide
          echo "=== MCP Kafka pod status ==="
          oc get pods -l app.kubernetes.io/name=noc-kafka -n hub -o wide
          echo "=== kafka-create-topics job status ==="
          oc get job kafka-create-topics -n hub -o wide 2>/dev/null || echo "Job not found"
          echo "=== Kafka logs (last 50 lines) ==="
          oc logs -l app=kafka -n hub --tail=50 2>/dev/null || echo "No logs"
          echo "=== MCP Kafka logs (last 50 lines) ==="
          oc logs -l app.kubernetes.io/name=noc-kafka -n hub --tail=50 2>/dev/null || echo "No logs"
        shell: bash

      - name: Collect LlamaStack diagnostics
        if: failure()
        run: |
          echo "=== All pod statuses ==="
          oc get pods -n hub -o wide
          echo ""
          echo "=== Non-running pods describe ==="
          for pod in $(oc get pods -n hub --no-headers | grep -v "Running\|Completed" | awk '{print $1}'); do
            echo "--- Describe: $pod ---"
            oc describe pod "$pod" -n hub | tail -30
          done
          echo ""
          echo "=== Init container logs ==="
          for pod in $(oc get pods -n hub --no-headers | grep "Init" | awk '{print $1}'); do
            echo "--- Init logs: $pod ---"
            oc logs "$pod" -n hub --all-containers --ignore-errors --tail=20 2>&1 || true
          done
          echo ""
          echo "=== LlamaStackDistribution status ==="
          oc get llamastackdistribution -n hub -o yaml 2>/dev/null || echo "No CRD found"
          echo ""
          echo "=== Operator logs (last 30 lines) ==="
          oc logs deployment/llama-stack-k8s-operator-controller-manager \
            -n llama-stack-k8s-operator-system --tail=30 2>/dev/null || echo "No operator logs"
          echo ""
          echo "=== Namespace events (last 20) ==="
          oc get events -n hub --sort-by='.lastTimestamp' | tail -20
        shell: bash

      - name: Inspect Cluster - Hub
        if: always()
        uses: ./.github/actions/inspect-ns
        with:
          artifactPrefix: hub
          namespace: hub

      - name: Verify helm-uninstall cleanup
        if: always()
        run: |
          make helm-uninstall 2>/dev/null || true
          oc wait --for=delete pod -l app.kubernetes.io/instance=hub -n hub --timeout=30s 2>/dev/null || true

          remaining=$(oc get all -n hub --no-headers 2>/dev/null | grep -v "Completed" || true)
          if [ -n "$remaining" ]; then
            echo "::warning::Resources still present in hub namespace after helm-uninstall:"
            echo "$remaining"
          fi
          echo "All resources cleaned up successfully"
        shell: bash
